<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Ödev Oluştur</title>
</head>
<body>
    <h2>Yeni Ödev Oluştur</h2>

    <form method="POST">
        <label>Ödev Başlığı:</label><br>
        <input type="text" name="title" required><br><br>

        <label>Açıklama:</label><br>
        <textarea name="description" rows="6" cols="50" required></textarea><br><br>

        <label>Programlama Dili:</label><br>
        <select name="language" required>
            <option value="" disabled selected>Seçiniz</option>
            <option value="python">Python</option>
            <option value="c">C</option>
            <option value="cpp">C++</option>
            <option value="java">Java</option>
        </select><br><br>

        <label>Teslim Tarihi:</label><br>
        <input type="datetime-local" name="due_date" required><br><br>

        <label>Maksimum Puan:</label><br>
        <input type="number" name="max_score" value="100" required><br><br>

        <button type="submit">Ödevi Oluştur</button>
    </form>

    <br>
    <a href="{{ url_for('teacher_panel') }}">Panele Dön</a>
</body>
</html>
